<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kart over lokasjoner</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">

</head>
<body>

    <div id="searchBox">
    <input type="text" id="searchText" placeholder="Søk...">
    <button id="searchButton">Enter</button>
</div>

<div id="map"></div>

<div id="timelineContainer" style="display:none;">

    <div id="timelineInfo">

        <label>
            <input type="checkbox" id="showLabels">
            Vis beskrivelser
        </label>

        <label>
    <input type="checkbox" id="autoPopup">
    Vis hendelser
</label>

        <div id="timelineYear">
            -
        </div>

    </div>

    <div id="timelineSliderArea">

        <span id="timelineMin"></span>

        <input type="range" id="timelineSlider">

        <span id="timelineMax"></span>

    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
